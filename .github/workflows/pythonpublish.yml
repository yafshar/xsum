name: Upload xsum Package

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.release.tag_name }}
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install build twine "versioneer[toml]>=0.29"
    - name: Check release version
      run: |
        python - <<'PY'
        import sys
        import versioneer

        version = versioneer.get_version()
        print(f"Versioneer version: {version}")
        if version.startswith("0+untagged") or "+" in version:
            sys.exit("Refusing to publish an untagged/local Versioneer build")
        PY
    - name: Build and publish
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        python -m build --sdist
        twine check dist/*.tar.gz
        twine upload dist/*.tar.gz
